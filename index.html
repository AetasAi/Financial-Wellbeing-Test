<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take the Financial Wellbeing Test | Aetas in the Workplace</title>
  <meta name="description" content="A short workplace financial wellbeing diagnostic for HR leaders, founders and business owners to assess whether financial pressure may be affecting their workforce." />

  <style>
    :root {
      --aetas-navy: #17233f;
      --aetas-blue: #2f5f9f;
      --aetas-gold: #c7a45d;
      --aetas-light: #f6f7f9;
      --aetas-border: #d9dee8;
      --aetas-text: #1f2933;
      --aetas-muted: #5f6b7a;
      --white: #ffffff;
      --success: #edf8f0;
      --success-border: #9bd3aa;
      --error: #fff1f1;
      --error-border: #f2b6b8;
      --error-text: #9f1d20;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Open Sans", Arial, sans-serif;
      color: var(--aetas-text);
      background: var(--aetas-light);
      line-height: 1.6;
    }

    .page-wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      background: linear-gradient(135deg, var(--aetas-navy), var(--aetas-blue));
      color: var(--white);
      border-radius: 22px;
      padding: 46px 38px;
      margin-bottom: 28px;
      box-shadow: 0 18px 45px rgba(23, 35, 63, 0.18);
    }

    .eyebrow {
      color: var(--aetas-gold);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.08;
      max-width: 850px;
    }

    .hero p {
      font-size: 18px;
      max-width: 820px;
      margin: 0 0 22px;
      color: rgba(255,255,255,0.88);
    }

    .hero-points {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 28px;
    }

    .hero-point {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--aetas-border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(31, 41, 51, 0.06);
    }

    .card h2, .card h3 {
      color: var(--aetas-navy);
      margin-top: 0;
      line-height: 1.25;
    }

    .quiz-form {
      margin-top: 12px;
    }

    .question {
      padding: 22px 0;
      border-bottom: 1px solid var(--aetas-border);
    }

    .question:last-of-type {
      border-bottom: none;
    }

    .question legend {
      font-weight: 700;
      color: var(--aetas-navy);
      margin-bottom: 14px;
      font-size: 17px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid var(--aetas-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #fff;
    }

    .option:hover {
      border-color: var(--aetas-blue);
      background: #f9fbff;
    }

    .option input {
      margin-top: 5px;
      accent-color: var(--aetas-blue);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 26px;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
      font-size: 15px;
    }

    .btn-primary {
      background: var(--aetas-gold);
      color: var(--aetas-navy);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(199, 164, 93, 0.3);
    }

    .btn-secondary {
      background: var(--aetas-navy);
      color: var(--white);
    }

    .btn-secondary:hover {
      background: var(--aetas-blue);
    }

    .small-note {
      color: var(--aetas-muted);
      font-size: 14px;
      margin-top: 12px;
    }

    .result-box {
      display: none;
      margin-top: 28px;
      padding: 26px;
      border-radius: 18px;
      border: 1px solid var(--aetas-border);
      background: #fbfcff;
    }

    .result-box.active {
      display: block;
    }

    .score-pill {
      display: inline-block;
      background: var(--aetas-navy);
      color: var(--white);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .result-title {
      color: var(--aetas-navy);
      margin: 0 0 10px;
      font-size: 25px;
    }

    .lead-form {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--aetas-border);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    label.field-label {
      display: block;
      font-weight: 700;
      color: var(--aetas-navy);
      font-size: 14px;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="email"], input[type="tel"], textarea {
      width: 100%;
      border: 1px solid var(--aetas-border);
      border-radius: 12px;
      padding: 12px 13px;
      font-family: inherit;
      font-size: 15px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .sidebar-card {
      position: sticky;
      top: 22px;
    }

    .sidebar-card p {
      color: var(--aetas-muted);
    }

    .stat-box {
      border-left: 4px solid var(--aetas-gold);
      padding: 14px 16px;
      background: #fbfaf6;
      border-radius: 12px;
      margin: 18px 0;
    }

    .process-list {
      list-style: none;
      padding: 0;
      margin: 18px 0 0;
      counter-reset: process;
    }

    .process-list li {
      counter-increment: process;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .process-list li::before {
      content: counter(process);
      width: 34px;
      height: 34px;
      background: var(--aetas-navy);
      color: var(--white);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .error-message, .success-message {
      display: none;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 16px;
      font-weight: 700;
    }

    .error-message {
      color: var(--error-text);
      background: var(--error);
      border: 1px solid var(--error-border);
    }

    .success-message {
      color: #185b2b;
      background: var(--success);
      border: 1px solid var(--success-border);
    }

    .error-message.active, .success-message.active {
      display: block;
    }

    @media (max-width: 860px) {
      .content-grid, .hero-points, .field-grid {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 34px 24px;
      }

      .sidebar-card {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main class="page-wrap">
    <section class="hero">
      <div class="eyebrow">Aetas in the Workplace</div>
      <h1>Take the Financial Wellbeing Test</h1>
      <p>A short diagnostic for HR leaders, founders and business owners to assess whether financial pressure may be affecting their workforce.</p>
      <div class="hero-points">
